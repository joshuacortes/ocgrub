<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OCGrub Navigation - Light Theme</title>
<style>
/* RESET */
body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #f7f7f7;
}

/* HEADER */
.oc-header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: #ffffff;
  border-bottom: 1px solid #e2e8f0;
  width: 100%;
}

.oc-header .container {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
}

/* LOGO */
.oc-logo {
  color: #1f2937;
  text-decoration: none;
  font-weight: 700;
  font-size: 20px;
}

/* DESKTOP NAV */
.oc-desktop-nav {
  display: flex;
  gap: 20px;
}

.oc-desktop-nav a {
  color: #4b5563;
  text-decoration: none;
  font-size: 14px;
  padding: 4px 0;
  transition: color 0.2s;
}

.oc-desktop-nav a:hover {
  color: #1f2937;
}

/* CTA BUTTONS */
.oc-cta {
  display: flex;
  gap: 10px;
}

.oc-cta a {
  text-decoration: none;
  border-radius: 8px;
  padding: 8px 14px;
  font-size: 13px;
  font-weight: 600;
}

.oc-cta .btn-primary {
  background: #ff6b35;
  color: #ffffff;
}

.oc-cta .btn-outline {
  border: 1px solid #d1d5db;
  color: #1f2937;
  background: transparent;
}

/* MOBILE HEADER BUTTONS */
.mobile-header-buttons {
  display: none;
  gap: 8px;
  align-items: center;
}

/* MOBILE NEWS BUTTON */
.mobile-news-btn {
  font-size: 14px;
  font-weight: 600;
  text-decoration: none;
  color: #ffffff;
  background: #ff6b35;
  padding: 8px 12px;
  border-radius: 8px;
  white-space: nowrap;
  margin-right:10px;
}

/* HAMBURGER BUTTON */
.oc-menu-btn {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
}

.oc-menu-btn span {
  width: 22px;
  height: 2px;
  background: #000000;
  display: block;
}

/* MOBILE MENU */
#ocMobileMenu {
  position: fixed;
  top: 0;
  left: 0;
  width: 250px;
  height: 100%;
  background: #ffffff;
  box-shadow: 2px 0 12px rgba(0,0,0,0.1);
  transform: translateX(-100%);
  transition: transform 0.25s ease;
  padding: 60px 16px 16px 16px;
  display: flex;
  flex-direction: column;
  z-index: 998;
}

#ocMobileMenu a {
  display: block;
  color: #1f2937;
  text-decoration: none;
  padding: 16px 0;
  font-size: 18px;
  border-bottom: 1px solid #e5e7eb;
}

#ocMobileMenu a.mobile-btn-primary {
  background: #ff6b35;
  color: #fff;
  border-radius: 10px;
  text-align: center;
  margin-top: 10px;
}

#ocMobileMenu a.mobile-btn-outline {
  border: 1px solid #d1d5db;
  border-radius: 10px;
  text-align: center;
  margin-top: 10px;
}

/* ACTIVE CLASS FOR MOBILE MENU */
#ocMobileMenu.active {
  transform: translateX(0);
}

/* RESPONSIVE */
@media (max-width: 900px) {
  .oc-desktop-nav,
  .oc-cta {
    display: none;
  }
  .mobile-header-buttons {
    display: flex;
  }
}
</style>
</head>
<body>

<header class="oc-header">
  <div class="container">
    <a href="/" class="oc-logo">OCGrub</a>

    <!-- DESKTOP NAV -->
    <nav class="oc-desktop-nav">
      <a href="/cities/">Cities</a>
      <a href="/best-of/">Best Of</a>
      <a href="/late-night/">Late Night</a>
      <a href="/deals/">Deals</a>
      <a href="/map/">Map</a>
    </nav>

    <!-- CTA BUTTONS -->
    <div class="oc-cta">
      <a href="/newsletter/" class="btn-outline">Newsletter</a>
      <a href="/get-featured/" class="btn-primary">Get Featured</a>
    </div>

    <!-- MOBILE BUTTONS -->
    <div class="mobile-header-buttons">
      <a href="/news/" class="mobile-news-btn">News</a>
      <div class="oc-menu-btn" id="mobileMenuBtn">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </div>
</header>

<!-- MOBILE MENU -->
<div id="ocMobileMenu">
  <a href="/cities/">Browse Cities</a>
  <a href="/best-of/">Best Of Orange County</a>
  <a href="/late-night/">Late Night Food</a>
  <a href="/deals/">Food Deals</a>
  <a href="/map/">Food Map</a>

  <a href="/newsletter/" class="mobile-btn-outline">Join Newsletter</a>
  <a href="/get-featured/" class="mobile-btn-primary">Get Featured</a>
</div>

<script>
const mobileMenu = document.getElementById('ocMobileMenu');
const mobileBtn = document.getElementById('mobileMenuBtn');

mobileBtn.addEventListener('click', () => {
  mobileMenu.classList.toggle('active');
});
</script>

</body>
</html>
